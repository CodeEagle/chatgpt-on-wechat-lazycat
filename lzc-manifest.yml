lzc-sdk-version: '0.1'
package: com.selfstudio.chatgpt-on-wechat
version: 1.0.0
min_os_version: 1.3.8
name: ChatGPT-on-WeChat
description: (LazyCat Auto-build) AI 聊天机器人 - 支持微信/飞书/钉钉/Web 控制台
license: MIT
homepage: https://github.com/zhayujie/chatgpt-on-wechat
author: zhayujie
application:
  subdomain: chatgpt-on-wechat
  public_path:
    - /
  upstreams:
    - location: /
      backend: http://chatgpt-on-wechat:9899/
services:
  chatgpt-on-wechat:
    image: zhayujie/chatgpt-on-wechat:latest
    environment:
      # 必需配置 - Mock 值，启动后需要用户在设置中配置
      - OPEN_AI_API_KEY=sk-placeholder-replace-in-settings

      # 渠道配置
      - CHANNEL_TYPE=web
      - MODEL=chatgpt

      # OpenAI 兼容配置
      - OPEN_AI_API_BASE=https://api.openai.com/v1

      # 可选配置
      - PROXY
      - CONVERSATION_MAX_TOKENS=4096
      - CHARACTER_DESC=你是一个智能助手

      # LinkAI 配置（可选）
      - USE_LINKAI=false
      - LINKAI_API_KEY
      - LINKAI_APP_CODE

      # 其他模型 API Keys（根据需要配置）
      - CLAUDE_API_KEY
      - GEMINI_API_KEY
      - DASHSCOPE_API_KEY
      - ZHIPU_AI_API_KEY
      - MOONSHOT_API_KEY
      - MINIMAX_API_KEY
    binds:
      - /lzcapp/var/config:/root/.chatgpt-on-wechat/config
      - /lzcapp/var/data:/root/.chatgpt-on-wechat/data
      - /lzcapp/var/logs:/root/.chatgpt-on-wechat/logs
    setup_script: |
      # 创建配置目录
      mkdir -p /root/.chatgpt-on-wechat/config
      mkdir -p /root/.chatgpt-on-wechat/data
      mkdir -p /root/.chatgpt-on-wechat/logs

      CONFIG_FILE="/root/.chatgpt-on-wechat/config/config.json"

      # 如果配置文件不存在，创建默认配置（含 Mock API Key）
      if [ ! -f "$CONFIG_FILE" ]; then
        cat > "$CONFIG_FILE" << 'EOF'
{
  "channel_type": "web",
  "web_port": 9899,
  "model": "chatgpt",
  "open_ai_api_key": "sk-placeholder-replace-in-settings",
  "conversation_max_tokens": 4096,
  "character_desc": "你是一个智能助手，请在设置中配置有效的 API 密钥"
}
EOF
        echo "Created default config.json with mock API key"
      fi

      echo ""
      echo "=========================================="
      echo "ChatGPT-on-WeChat 已启动"
      echo "访问：http://localhost:9899/chat"
      echo ""
      echo "注意：请在设置中配置有效的 API 密钥"
      echo "=========================================="
      echo ""
locales:
  en:
    name: ChatGPT-on-WeChat
    description: (LazyCat) AI chatbot supporting WeChat/Feishu/Dingtalk/Web
  zh:
    name: ChatGPT-on-WeChat
    description: （懒猫）支持微信/飞书/钉钉/Web 的 AI 聊天机器人
